    <main>
        <!--Dashboard Currently located and logged in Section-->
       <section>
            <div class="admin_common_Grid">
                    <img class="loged_in_User_image" src="images/mrman.png"/>
                    <label class="logedin_user_text">Hi, Nolan Westwood</label>
                    <div class="admin_common_Grid">
                        <a class="navlinks nav_centering margin_right" href="loginmenu.html">
                          <img class="nav_image" src="images/exit_50px.png"/> <label  class="logedin_user_text">Logout</label>
                        </a>
                       
                    </div>
                </div>
                <div class="admin_common_Grid">
                    <img class="nav_image" src="images/combo_chart_50px.png"/> <label class="logedin_user_text">Dashboard</label>

       </section>
        <!--First Collection View-->
        <section  class="Center_for-First-Collection-View">
           <div class="barbershop_appointments_View">

                    <img class="content_posit" src="images/calendar_50px.png"/>
                    <label class="appointments_view_text content_posit">BarberShop Appointments</label>
                </div>

                <label class="label_Pending">21 Pending</label>
                <div class="flexing_for_number_nd_label">
                    <label class="label_7_big_Number">21</label> <label class="label_completed">Completed</label>
                </div>

           </div>
        </section>
        <!--the Remaining collection views-->
        <section class="position_Center_remaining_grids">

            <div class="remaining_view_grid">

                <!--the Remaining collection views Revenue-->
            <div class="remaining_views">
                <div class="">
                    <img class="header_image_On_Remaining_views"  src="images/cash_register_50px.png"/>
                    <label class="header_Text_On_Remaining_Views">Revenue ZMW</label>
                </div>
                <div class="revenues_telemetry_grid_Stuff">
                    <div >
                        <label class="revenue_telemetry_Text">Today</label>
                        <div class="position_Center">
                            <label class="revenue_telemetry_Number">7</label><label class="k_text_on_revenue_collection">K</label>
                        </div>
                    </div>

                    <div >
                        <label class="revenue_telemetry_Text">Last Week</label>
                        <div class="position_Center">
                            <label class="revenue_telemetry_Number">31</label><label class="k_text_on_revenue_collection">K</label>
                        </div>
                    </div>

                    <div >
                        <label class="revenue_telemetry_Text">Last Month</label>
                        <div class="position_Center">
                            <label class="revenue_telemetry_Number">400</label><label class="k_text_on_revenue_collection">K</label>
                        </div>
                    </div>

                    <div >
                        <label class="revenue_telemetry_Text">Last 3 Months</label>
                        <div class="position_Center">
                            <label class="revenue_telemetry_Number">9</label><label class="k_text_on_revenue_collection">K</label>
                        </div>
                    </div>

                    <div >
                        <label class="revenue_telemetry_Text">Last 6 Months</label>
                        <div class="position_Center">
                            <label class="revenue_telemetry_Number">21</label><label class="k_text_on_revenue_collection">K</label>

                    </div>

                    <div >
                        <label class="revenue_telemetry_Text">Last 12 Months</label>
                        <div class="position_Center">
                            <label class="revenue_telemetry_Number">900</label><label class="k_text_on_revenue_collection">K</label>
                        </div>
                    </div>
                </div>
            </div>
            <!--the Remaining collection views Staff-->
            <div class="remaining_views"> 
                <div class="">
                    <img class="header_image_On_Remaining_views" width="55px"  height="55px" src="images/staff_50px.png"/>
                    <label class="header_Text_On_Remaining_Views" >Staff </label>
                </div>
                <div class="staff_section_text_positioning">
                 <label class="staff_section_text" >Members of Staff</label>
                <label class="staff_section_number" >12</label>
                </div>
                

            </div>
            <!--the Remaining collection views products-->
            <div class="remaining_views "> 
                
                 <div class="">
                    <img class="header_image_On_Remaining_views" src="images/basket_50px.png"/>
                    <label class="header_Text_On_Remaining_Views" >Products</label>
                </div>
                <div class="products_telemetry_grid_Stuff">

                    <div class="position_vertical">
                        <label class="products_text" >Products</label>
                        <label class="products_number" >12</label>
                    </div>

                    <div class="position_vertical">
                        <label class="products_text" >Services</label>
                        <label class="products_number" >8</label>
                    </div>
