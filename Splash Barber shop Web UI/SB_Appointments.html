            <div class="menu">
                <ul>
                        <li>
                            <a class="navlinks nav_centering" href="SB_Dashboard.html">
                                <img class="nav_image" src="images/combo_chart_50px.png">
                                <br>
                                Dashboard
                            </a>
                        </li>
                        <li>
                            <a class="navlinks nav_centering" href="SB_Payments.html">
                                <img class="nav_image" src="images/cash_register_50px.png">
                                <br>
                                Payments
                            </a>
                        </li>
                        <li>
                            <a class="navlinks nav_centering" href="SB_Staff.html">
                                <img class="nav_image" src="images/staff_50px.png">
                                <br>
                                Staff
                            </a>
                        </li>
                        <li>
                            <a class="navlinks nav_centering"  href="SB_Products.html">
                                <img class="nav_image" src="images/basket_50px.png">
                                <br>
                                Products
                            </a>
                        </li>
                        <li>

                                <br>
                                Calendar
                            </a>
                        </li>                        
                </ul>
            </div>
        </div>
    </Header>

    <main>

        <!--Staff Currently located and logged in Section-->
       <section>
            <div class="admin_common_Grid">
                    <img class="loged_in_User_image" src="images/mrman.png"/>
                    <label class="logedin_user_text">Hi, Nolan Westwood...</label>
                    <div class="admin_common_Grid">
                        <a class="navlinks nav_centering margin_right" href="loginmenu.html">
                          <img class="nav_image" src="images/exit_50px.png"/> <label  class="logedin_user_text">Logout</label>
                        </a>
                       
                    </div>
                </div>
                <div class="admin_common_Grid">
                    <img class="nav_image" src="images/calendar_50px.png"/> <label class="logedin_user_text">Appointments</label>
                </div>
       </section>


         <!--Appointments Collection View-->
        <section  class="Center_for-First-Collection-View">
           <div class="barbershop_appointments_View">

                <div class="first_view_grid">
                    <img class="content_posit" src="images/calendar_50px.png"/>
                    <label class="appointments_view_text content_posit">BarberShop Appointments</label>
                </div>

                <label class="label_Pending">21 Pending</label>
                <label class="label_today">21 Today</label>
                
                <div class="flexing_for_number_nd_label">
                    <label class="label_7_big_Number">21</label> <label class="label_completed">Completed</label>
                </div>

                <div class="row_of_lables_tlemetry">
                    <label class="label_margin-left label_this_week_month_average">43 This week </label>
                    <label class="label_this_week_month_average">172 This month </label>
                    <label class="label_this_week_month_average label_margin-right">Average per Month 100</label>
                </div>

           </div>
        </section>
        <!--Form section-->
       <section class="form_section_form_and_datagrid_positioning">
        <div class="form_section_search_textbox_and_search_button">
           <input class="search_text_box" placeholder="Search Todays Appointment"/>
           <button class="search_button" style="display: flex; justify-content: center; align-items: center;"><img width="35px" src="images/search.png"/> <label>Search</label></button>
        </div>
        <div  class="form_Section_datagrid_and_paymentform">
            <div class="form_section_datagrid">
                <label class="datagrid_header">|Customer Name | Appointment date | Product  | Price | Completed By|</label>
            </div>
            <div>
                <form class="form_Section_paymentform">
                    <input class="form_section_text_box" placeholder="Customer name">
                    <input class="form_section_text_box" placeholder="Member Of staff">
                    <input hidden class="form_section_text_box" placeholder="Email Address">
                    <input hidden class="form_section_text_box" placeholder="Product/Service">
                    <input hidden class="form_section_text_box" placeholder="Amount">
                    <button class="form_section_button_box">Complete appointment</button>
                </form>
            </div>
        </div>

       </section>

    </main>

     <footer class="navlinks position_Center_Footer">
        <label>Designed|Developed By Simulakra Technologies</label>
    </footer>
