    <main>

          <!--the Remaining collection views Revenue-->
       <section class="revenue_Collections_view_positioning">
        
            <div class="revenue_collctions_view">
                <div class="revenue_collections_heading">
                    <img class="header_image_On_Remaining_views"  src="images/cash_register_50px.png"/>

                <div class="revenue_collctions_view_telemetry_grid">

                            <label class="revenue_telemetry_Text">Today</label>

                                <label class="revenue_telemetry_Number">7</label><label class="k_text_on_revenue_collection">K</label>
                            </div>
                        </div>

                        <div >
                            <label class="revenue_telemetry_Text">Last Week</label>
                            <div class="position_Center">
                                <label class="revenue_telemetry_Number">31</label><label class="k_text_on_revenue_collection">K</label>
                            </div>
                        </div>

                        <div >
                            <label class="revenue_telemetry_Text">Last Month</label>
                            <div class="position_Center">
                                <label class="revenue_telemetry_Number">400</label><label class="k_text_on_revenue_collection">K</label>

                        </div>

                        <div >

                            </div>
                        </div>
                    </div>
               
            </div>
       </section>
      <!--Form section-->
       <section class="form_section_form_and_datagrid_positioning">
        <div class="form_section_search_textbox_and_search_button">
           <input class="search_text_box" placeholder="Search For Customers By Name"/>

        </div>
        <div  class="form_Section_datagrid_and_paymentform">
            <div class="form_section_datagrid">
                <label class="datagrid_header">|Customer Name | Number | Email Address  | Product/Sevice | Amount|</label>
            </div>
            <div>
                <form class="form_Section_paymentform">
                    <input class="form_section_text_box" placeholder="Customer name">
                    <input class="form_section_text_box" placeholder="Number">
                    <input class="form_section_text_box" placeholder="Email Address">
                    <input class="form_section_text_box" placeholder="Product/Service">
                    <input class="form_section_text_box" placeholder="Amount">
                    <button class="form_section_button_box">Process Payment</button>
                </form>
            </div>
        </div>

       </section>
